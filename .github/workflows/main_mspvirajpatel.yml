name: Build and deploy Node.js app to Azure Web App - mspvirajpatel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Debug build outputs before upload
        run: |
          echo "Working directory: $(pwd)"
          ls -la
          for d in build dist .next out public; do
            echo "=== $d ==="
            if [ -d "$d" ]; then ls -la "$d"; else echo "NO $d directory"; fi
          done

      - name: Verify build output exists
        run: |
          if [ ! -d build ] && [ ! -d dist ] && [ ! -d .next ] && [ ! -d out ] && [ ! -d public ]; then
            echo "No build output found (build, dist, .next, out, or public). Please confirm your build step and output folder."
            exit 1
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Prefer uploading only the build output instead of the whole repo.
          # Change the paths below to your project's output folder if different.
          path: |
            build/**
            dist/**
            .next/**
            out/**
            public/**
          # Fail the job early if no files are found to upload so the error is visible in the build job
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'mspvirajpatel'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_0A69BA930A374742B193CC33249CFF08 }}
          package: ./node-app
