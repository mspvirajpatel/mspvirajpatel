name: Build and deploy Node.js app to Azure Web App - mspvirajpatel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint || true

      - name: Build project
        run: npm run build

      - name: Debug build outputs before upload
        run: |
          echo "Working directory: $(pwd)"
          echo "=== Root directory ==="
          ls -la
          echo ""
          echo "=== Checking for build artifacts ==="
          if [ -d ".next" ]; then
            echo "✓ .next directory found"
            du -sh .next
          else
            echo "✗ .next directory NOT found"
          fi
          if [ -d "public" ]; then
            echo "✓ public directory found"
            du -sh public
            ls -la public | head -20
          else
            echo "✗ public directory NOT found"
          fi
          if [ -f "server.js" ]; then
            echo "✓ server.js found"
          fi
          if [ -f "package.json" ]; then
            echo "✓ package.json found"
          fi

      - name: Verify build output exists
        run: |
          if [ ! -d ".next" ]; then
            echo "ERROR: .next directory not found after build. This is required for Next.js apps."
            exit 1
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # For Next.js apps, we need to upload the build output and runtime files
          path: |
            .next/**
            public/**
            server.js
            package.json
            package-lock.json
            node_modules/**
          # Fail the job early if no files are found
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Debug downloaded files
        run: |
          echo "=== Contents of workspace after artifact download ==="
          ls -la
          echo ""
          if [ -d ".next" ]; then
            echo "✓ .next directory present"
          else
            echo "✗ .next directory missing - deployment will fail"
          fi

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'mspvirajpatel'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_0A69BA930A374742B193CC33249CFF08 }}
          package: .
